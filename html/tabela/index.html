<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tabela Moderna</title>
    <link rel="stylesheet" href="tabela.css">
</head>
<body>

<div class="container">
    <table id="tabela">
        <thead>
            <tr>
                <th colspan="4">🏨 Configuração dos Apartamentos</th>
            </tr>
            <tr>
                <th colspan="2">Todos</th>
                <th>Standard</th>
                <th>Luxo</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td colspan="2">❄️ Ar Condicionado <br> 🥤 Frigobar</td>
                <td>17m² <br> 📺 TV 14"</td>
                <td>21m² <br> 📺 TV 21"</td>
            </tr>

            <tr class="grupo">
                <td rowspan="2" class="titulo">💰 Diária por Temporada</td>
                <td>Alta</td>
                <td>R$ 200,00</td>
                <td>R$ 250,00</td>
            </tr>

            <tr class="grupo">
                <td>Baixa</td>
                <td>R$ 120,00</td>
                <td>R$ 180,00</td>
            </tr>
        </tbody>
    </table>
</div>

<script src="tabela.js"></script>
</body>
</html>
