<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meus Projetos</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      transition: 0.3s;
      text-align: center;
    }

    .card:hover {
      transform: translateY(-5px);
      background: #334155;
    }

    a {
      text-decoration: none;
      color: #38bdf8;
      font-weight: bold;
    }

    p {
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <h1>🚀 Meus Projetos</h1>

  <div class="grid">

    <div class="card">
      <h2>tabelas</h2>
      <p>tabela desafio 2</p>
      <a href="html/tabela/index.html">Abrir</a>
    </div>

    <div class="card">
      <h2>Projeto 2</h2>
      <p>Descrição rápida do projeto</p>
      <a href="projeto2/index.html">Abrir</a>
    </div>

    <div class="card">
      <h2>Projeto 3</h2>
      <p>Descrição rápida do projeto</p>
      <a href="projeto3/index.html">Abrir</a>
    </div>

  </div>

</body>
</html>
